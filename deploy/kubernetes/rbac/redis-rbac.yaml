apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-sa
---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: redis-role
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["redis-secrets"]
  verbs: ["get"]
---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis-rolebinding
subjects:
- kind: ServiceAccount
  name: redis-sa
roleRef:
  kind: Role
  name: redis-role
  apiGroup: rbac.authorization.k8s.io
