apiVersion: v1
kind: ServiceAccount
metadata:
  name: celery-worker-sa
---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: celery-worker-role
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: [
    "django-secrets",
    "database-secrets",
    "redis-secrets",
    "rabbitmq-secrets",
  ]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["power-finance"]
  verbs: ["get"]
---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: celery-worker-rolebinding
subjects:
- kind: ServiceAccount
  name: celery-worker-sa
roleRef:
  kind: Role
  name: celery-worker-role
  apiGroup: rbac.authorization.k8s.io
