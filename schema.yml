          description: ''
  /api/v1/transactions/:
    get:
      operationId: transactions_list
      description: Retrieve a paginated list of your transactions.
      summary: List transactions
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: Number of results to return per page.
      - in: query
        name: offset
        schema:
          type: integer
        description: The initial index from which to return the results.
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - transactions
      security:
      - ClerkJWTAuthentication: []
      - cookieAuth: []
      - basicAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTransactionPreviewResponseList'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
    post:
      operationId: transactions_create
      description: Create a new income, expense, or transfer transaction.
      summary: Create a new transaction
      tags:
      - transactions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequestRequest'
        required: true
      security:
      - ClerkJWTAuthentication: []
      - cookieAuth: []
      - basicAuth: []
      - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
  /api/v1/transactions/{id}/:
    get:
      operationId: transactions_retrieve
      description: Retrieve detailed information about a specific transaction.
      summary: Get transaction details
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Transaction ID
        required: true
      tags:
      - transactions
      security:
      - ClerkJWTAuthentication: []
      - cookieAuth: []
      - basicAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
    patch:
      operationId: transactions_partial_update
      description: Update description, category, or type of an existing transaction.
      summary: Update a transaction
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Transaction ID
        required: true
      tags:
      - transactions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateTransactionRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateTransactionRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateTransactionRequestRequest'
      security:
      - ClerkJWTAuthentication: []
      - cookieAuth: []
      - basicAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
    delete:
      operationId: transactions_delete
      description: Delete a specific transaction.
      summary: Delete a transaction
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Transaction ID
        required: true
      tags:
      - transactions
      security:
      - ClerkJWTAuthentication: []
      - cookieAuth: []
      - basicAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
