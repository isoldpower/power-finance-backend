components:
  schemas:
    CategoryAnalytics:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CategoryAnalyticsItem'
          description: List of category spending items
        metadata:
          type: object
          additionalProperties: {}
          description: Additional analytical metadata
      required:
      - data
      - metadata
    CategoryAnalyticsItem:
      type: object
      properties:
        category:
          type: string
          description: Name of the spending category
        amount:
          type: number
          format: double
          description: Total amount spent in this category
      required:
      - amount
      - category
    CreateTransactionRequestRequest:
      type: object
      properties:
        sender:
          $ref: '#/components/schemas/TransactionParticipantFieldRequest'
        receiver:
          $ref: '#/components/schemas/TransactionParticipantFieldRequest'
        description:
          type: string
        type:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
      required:
      - type
    CreateWalletRequestRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        credit:
          type: boolean
        balance:
          $ref: '#/components/schemas/MoneyFieldRequest'
      required:
      - balance
      - credit
      - name
    CreateWebhookRequestRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
        url:
          type: string
          format: uri
          minLength: 1
      required:
      - title
      - url
    ExpenditureAnalytics:
      type: object
      properties:
        data:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: number
              format: double
          description: Nested dictionary containing expenditure data over time
        metadata:
          type: object
          additionalProperties: {}
          description: Additional analytical metadata
      required:
      - data
      - metadata
    MessageMeta:
      type: object
      properties:
        id:
          type: string
          nullable: true
          description: Resource ID related to the message
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          description: Human-readable status or error message
        meta:
          allOf:
          - $ref: '#/components/schemas/MessageMeta'
          description: Additional metadata
      required:
      - message
      - meta
    MoneyFieldRequest:
      type: object
      description: 'Handles nested { "amount": "123.45", "currency": "USD" } in ISO
        4217 codes'
      properties:
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,16}(?:\.\d{0,2})?$
        currency:
          type: string
          minLength: 1
          maxLength: 3
      required:
      - amount
      - currency
    MoneyFlowAnalytics:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MoneyFlowData'
        metadata:
          type: object
          additionalProperties: {}
          description: Additional analytical metadata
      required:
      - data
      - metadata
    MoneyFlowData:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/MoneyFlowNode'
        links:
          type: array
          items:
            $ref: '#/components/schemas/MoneyFlowLink'
      required:
      - links
      - nodes
    MoneyFlowLink:
      type: object
      properties:
        source:
          type: string
          description: Source node name
        target:
          type: string
          description: Target node name
        value:
          type: number
          format: double
          description: Value of the link (amount transferred)
      required:
      - source
      - target
      - value
    MoneyFlowNode:
      type: object
      properties:
        name:
          type: string
          description: Name of the node (e.g., wallet or category)
        level:
          type: integer
          description: Hierarchical level of the node
      required:
