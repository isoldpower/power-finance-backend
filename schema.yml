openapi: 3.0.3
info:
  title: Power Finance API
  version: 1.0.0
  description: API documentation for Power Finance
paths:
  /api/v1/analytics/categories/:
    get:
      operationId: analytics_categories_list
      description: Get an overview of how funds are distributed across different spending
        categories.
      summary: Categories spending analytics
      tags:
      - analytics
      security:
      - ClerkJWTAuthentication: []
      - cookieAuth: []
      - basicAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryAnalytics'
          description: ''
  /api/v1/analytics/expenditure/:
    get:
      operationId: analytics_expenditures_list
      description: Get an overview of expenditures over time, grouped by categories.
      summary: Expenditures over time
      tags:
      - analytics
      security:
      - ClerkJWTAuthentication: []
      - cookieAuth: []
      - basicAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenditureAnalytics'
          description: ''
  /api/v1/analytics/money-flow/:
    get:
      operationId: analytics_money_flow_list
      description: Retrieve multi-level money flow data suitable for a Sankey diagram.
      summary: Money flow data
      tags:
      - analytics
      security:
      - ClerkJWTAuthentication: []
      - cookieAuth: []
      - basicAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoneyFlowAnalytics'
          description: ''
  /api/v1/analytics/spending-heatmap/:
    get:
      operationId: analytics_spending_heatmap_list
      description: Retrieve spending data mapped by date/time to generate a heatmap.
      summary: Spending heatmap data
      tags:
      - analytics
      security:
      - ClerkJWTAuthentication: []
      - cookieAuth: []
      - basicAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpendingHeatmap'
          description: ''
  /api/v1/analytics/wallet-history/{id}/:
    get:
      operationId: analytics_wallet_balance_history_retrieve
      description: Retrieve historical balance measurements for a specific wallet.
      summary: Wallet balance history
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: Wallet ID
        required: true
      tags:
      - analytics
      security:
      - ClerkJWTAuthentication: []
      - cookieAuth: []
      - basicAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
